<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>祖师残卷 · 衰败宗门重振录</title>
<meta name="description" content="七十年内，把这门派从七小派之末抬到三大宗之一 — 暗黑武侠仙侠养成" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0608'/%3E%3Cpath d='M16 18 L48 18 L48 50 L16 50 Z' fill='none' stroke='%23c9a35a' stroke-width='2'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Ma Shan Zheng' font-size='26' fill='%23c9a35a'%3E祖%3C/text%3E%3C/svg%3E" />
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&family=Long+Cang&family=Noto+Serif+SC:wght@400;600;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/main.css?v=110" />
<link rel="stylesheet" href="css/battle.css?v=110" />
</head>
<body>

<!-- 全局深色背景层 -->
<div id="ambient-layer">
  <div class="ambient-mist"></div>
  <div class="ambient-sparks" id="sparks"></div>
</div>

<!-- HUD -->
<header id="hud" class="screen-elem hidden">
  <div class="hud-left">
    <div class="seal-mark"><svg viewBox="0 0 64 64"><rect x="2" y="2" width="60" height="60" rx="2" fill="rgba(10,6,8,.85)" stroke="#c9a35a" stroke-width="1.5"/><rect x="6" y="6" width="52" height="52" rx="1" fill="none" stroke="#c9a35a" stroke-width=".5"/><text x="32" y="42" text-anchor="middle" font-family="Ma Shan Zheng" font-size="28" fill="#c9a35a">祖</text></svg></div>
    <div class="hud-title">
      <h1 id="hud-sect">残墟门</h1>
      <div class="hud-sub">第 <b id="hud-day">1</b> 日 · <b id="hud-time">辰</b>时 · <b id="hud-month">春</b> · 灵田 <b id="hud-field">1</b> 亩</div>
    </div>
  </div>
  <div class="hud-right">
    <div class="stat-pill" title="灵石 · 修为/突破"><i class="ic-img" style="background-image:url(assets/icons/ic_stone.png)"></i><b id="hud-stone">50</b><em>灵石</em></div>
    <div class="stat-pill" title="铜钱 · 坊市/修缮"><i class="ic-img" style="background-image:url(assets/icons/ic_coin.png)"></i><b id="hud-coin">300</b><em>铜钱</em></div>
    <div class="stat-pill"><i class="ic-img" style="background-image:url(assets/icons/ic_pill.png)"></i><b id="hud-pill">3</b><em>丹药</em></div>
    <div class="stat-pill"><i class="ic-img" style="background-image:url(assets/icons/ic_disciple.png)"></i><b id="hud-disc">3</b><em>弟子</em></div>
    <div class="stat-pill rep" id="pill-sect" title="点击查看宗门等级"><i class="ic-img" style="background-image:url(assets/icons/ic_sword.png)"></i><b id="hud-rep">无名小派</b></div>
    <button class="icon-btn" data-act="open-world" title="七大派">界</button>
    <button class="icon-btn" data-act="open-inventory" title="背囊道具">囊</button>
    <button class="icon-btn" data-act="open-settings" title="设置">⚙</button>
  </div>
</header>

<!-- 标题 -->
<section id="screen-title" class="screen active">
  <div class="title-bg-img"></div>
  <div class="title-stack">
    <div class="title-emblem">
      <svg viewBox="0 0 240 240">
        <defs>
          <radialGradient id="tg1"><stop offset="0" stop-color="#c9a35a"/><stop offset="1" stop-color="#5a3a10"/></radialGradient>
          <linearGradient id="tg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a83236"/><stop offset="1" stop-color="#5a0e10"/></linearGradient>
        </defs>
        <!-- 残破的方印 -->
        <rect x="20" y="20" width="200" height="200" fill="rgba(10,6,8,.7)" stroke="#c9a35a" stroke-width="3"/>
        <rect x="32" y="32" width="176" height="176" fill="none" stroke="#c9a35a" stroke-width="1" stroke-dasharray="4 6"/>
        <text x="120" y="148" text-anchor="middle" font-family="Ma Shan Zheng" font-size="100" fill="url(#tg1)" stroke="#c9a35a" stroke-width="1">祖</text>
        <!-- 裂纹 -->
        <path d="M30 40 L80 90 L60 110 L100 130 L80 170 L130 210" stroke="#0a0608" stroke-width="2" fill="none" opacity=".6"/>
        <path d="M210 50 L180 110 L200 140 L160 180" stroke="#0a0608" stroke-width="1.5" fill="none" opacity=".5"/>
        <!-- 朱砂血印 -->
        <circle cx="180" cy="200" r="8" fill="url(#tg2)" opacity=".85"/>
      </svg>
    </div>
    <h1 class="game-title">祖 师 残 卷</h1>
    <p class="title-sub">SECT · OF · BROKEN · LEGACY</p>
    <p class="title-poem">「七十年内 · 三大宗 · 或为尘」<br><em>— 残墟门第十七代 始</em></p>
    <div class="title-cta">
      <button class="btn primary" data-act="new-game">▷ 接 任 掌 门</button>
      <button class="btn" id="btn-continue" data-act="continue" style="display:none">⏵ 续 写 残 卷</button>
      <button class="btn ghost" data-act="open-codex">⌘ 弟 子 名 录</button>
      <button class="btn ghost" data-act="open-store">⚯ 仙 缘 阁</button>
      <button class="btn ghost" data-act="open-settings">⚙ 设 置</button>
    </div>
    <p class="title-credit">v1.03 · 一日一造 · 暗黑武侠仙侠</p>
  </div>
</section>

<!-- 大堂（祖师堂） -->
<section id="screen-hall" class="screen">
  <div class="hall-bg" id="hall-bg"></div>
  <div class="hall-overlay" id="hall-overlay"></div>

  <!-- 天气特效层（公共，可被各场景使用） -->
  <div id="weather-layer"></div>

  <!-- 时辰指示（右上） -->
  <div id="time-indicator">
    <span id="ti-icon">☀</span>
    <span id="ti-text">辰时 · 晴</span>
  </div>

  <!-- 弟子站位 -->
  <div class="disciples-row" id="disciples-row"></div>

  <!-- 中央祖师牌位/事件 -->
  <div class="hall-altar">
    <div class="altar-frame">
      <div class="altar-tag" id="altar-tag">第一日 · 黎明</div>
      <h2 id="altar-title">祖师残卷</h2>
      <p class="altar-quote" id="altar-quote">"夜里有人翻动地窖第三阶。"</p>
    </div>
  </div>

  <!-- 行动菜单：弟子组 / 宗门组 / 掌门组 -->
  <nav class="action-bar">
    <span class="ab-group" data-group="弟子">
      <button class="ab-btn" data-act="codex" data-tut="codex"><span class="ab-i with-icon"><i class="ic-large" style="background-image:url(assets/icons/ic_disciple.png)"></i></span><span class="ab-l">名 录</span></button>
      <button class="ab-btn" data-act="cultivate" data-tut="cultivate"><span class="ab-i with-icon"><i class="ic-large" style="background-image:url(assets/icons/ic_breakthru.png)"></i></span><span class="ab-l">闭 关</span></button>
      <button class="ab-btn" data-act="dispatch" data-tut="dispatch"><span class="ab-i with-icon"><i class="ic-large" style="background-image:url(assets/icons/ic_dispatch.png)"></i></span><span class="ab-l">派 遣</span></button>
    </span>
    <span class="ab-sep"></span>
    <span class="ab-group" data-group="宗门">
      <button class="ab-btn" data-act="recruit"><span class="ab-i with-icon"><i class="ic-large" style="background-image:url(assets/icons/ic_bond.png)"></i></span><span class="ab-l">坊 市</span></button>
      <button class="ab-btn" data-act="build" data-tut="build"><span class="ab-i">筑</span><span class="ab-l">修 缮</span></button>
      <button class="ab-btn" data-act="story" data-tut="story"><span class="ab-i with-icon"><i class="ic-large" style="background-image:url(assets/icons/ic_scroll.png)"></i></span><span class="ab-l">主 线</span></button>
      <button class="ab-btn" data-act="battle-hub"><span class="ab-i with-icon"><i class="ic-large" style="background-image:url(assets/icons/ic_sword.png)"></i></span><span class="ab-l">论 道</span></button>
    </span>
    <span class="ab-sep"></span>
    <span class="ab-group" data-group="掌门">
      <button class="ab-btn" data-act="self-cultivate"><span class="ab-i with-icon"><i class="ic-large ic-player" style="background-image:url(assets/portraits/d_player.jpg);background-position:center top"></i></span><span class="ab-l">自 修</span></button>
      <button class="ab-btn primary" data-act="next-day" data-tut="next-day"><span class="ab-i with-icon"><i class="ic-large" style="background-image:url(assets/icons/ic_bond.png)"></i></span><span class="ab-l">入 定</span></button>
    </span>
  </nav>
</section>

<!-- 派遣 -->
<section id="screen-dispatch" class="screen">
  <header class="topbar">
    <button class="back" data-act="back-hall">← 回祖师堂</button>
    <h2>派 遣 · 任 务 卷</h2>
    <div></div>
  </header>
  <div class="dispatch-grid" id="dispatch-grid"></div>
</section>

<!-- 修缮 · 宗门地图 -->
<section id="screen-build" class="screen">
  <header class="topbar">
    <button class="back" data-act="back-hall">← 回祖师堂</button>
    <h2>宗 门 · 山 门 地 图</h2>
    <div id="bmap-coin-info" style="font-size:12px;color:var(--candle);font-family:Ma Shan Zheng;letter-spacing:.1em"></div>
  </header>
  <div class="build-map-wrap" id="build-map-wrap">
    <div class="bmap-bg" id="bmap-bg"></div>
    <div class="bmap-overlay"></div>
    <div id="bmap-buildings"></div>
    <div id="bmap-tooltip" style="display:none"></div>
  </div>
</section>

<!-- 闭关（修炼） -->
<section id="screen-cultivate" class="screen">
  <header class="topbar">
    <button class="back" data-act="back-hall">← 回祖师堂</button>
    <h2>闭 关 · 修 炼</h2>
    <div></div>
  </header>
  <div class="cultivate-wrap" id="cultivate-wrap"></div>
</section>

<!-- 主线 -->
<section id="screen-story" class="screen">
  <header class="topbar">
    <button class="back" data-act="back-hall">← 回祖师堂</button>
    <h2>主 线 · 残 卷</h2>
    <div></div>
  </header>
  <div class="story-wrap" id="story-wrap"></div>
</section>

<!-- 名录 -->
<section id="screen-codex" class="screen">
  <header class="topbar">
    <button class="back" data-act="back-hall">← 回祖师堂</button>
    <h2>弟 子 名 录</h2>
    <div class="codex-tabs">
      <button class="tab active" data-tab="alive">门下</button>
      <button class="tab" data-tab="met">见过</button>
      <button class="tab" data-tab="dead">忆故人</button>
    </div>
  </header>
  <div class="codex-body" id="codex-body"></div>
</section>

<!-- 仙缘阁（付费 mock） -->
<section id="screen-store" class="screen">
  <header class="topbar">
    <button class="back" data-act="back-hall">← 回</button>
    <h2>仙 缘 阁</h2>
    <div class="codex-tabs">
      <button class="tab active" data-st="disciple">限定弟子</button>
      <button class="tab" data-st="theme">宗门皮肤</button>
      <button class="tab" data-st="pass">月卡 · 季票</button>
    </div>
  </header>
  <div class="store-body" id="store-body"></div>
</section>

<!-- 弟子详情 -->
<section id="screen-disciple" class="screen">
  <header class="topbar">
    <button class="back" data-act="back-hall">← 关闭</button>
    <h2 id="disc-title">弟子 · 详情</h2>
    <div></div>
  </header>
  <div class="disciple-detail" id="disciple-detail"></div>
</section>

<!-- Modal -->
<div id="modal" class="modal-mask"><div class="modal-card" id="modal-card"></div><button id="modal-close-x" title="关闭（Esc / 点击外部）">✕</button></div>

<!-- 对话气泡 -->
<div id="dialog" class="dialog-wrap"></div>

<!-- Toast -->
<div id="toast"></div>

<script src="js/data.js?v=110"></script>
<script src="js/audio.js?v=110"></script>
<script src="js/save.js?v=110"></script>
<script src="js/weather.js?v=110"></script>
<script src="js/tutorial.js?v=110"></script>
<script src="js/items.js?v=110"></script>
<script src="js/canjuan.js?v=110"></script>
<script src="js/player.js?v=110"></script>
<script src="js/world.js?v=110"></script>
<script src="js/tasks.js?v=110"></script>
<script src="js/skills.js?v=110"></script>
<script src="js/interact.js?v=110"></script>
<script src="js/recruit.js?v=110"></script>
<script src="js/disciples.js?v=110"></script>
<script src="js/dispatch.js?v=110"></script>
<script src="js/build.js?v=110"></script>
<script src="js/story.js?v=110"></script>
<script src="js/codex.js?v=110"></script>
<script src="js/store.js?v=110"></script>
<script src="js/battle_data.js?v=110"></script>
<script src="js/battle.js?v=110"></script>
<script src="js/main.js?v=110"></script>
</body>
</html>
